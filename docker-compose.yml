services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: musicfy
      POSTGRES_PASSWORD: musicfy
      POSTGRES_DB: musicfy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicfy -d musicfy"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${PG_HOST_PORT:-5432}:5432"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://musicfy:musicfy@postgres:5432/musicfy
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
