# Production compose для musicfy.
# Запускается за общим reverse-proxy Traefik (/opt/edge, сеть web external).
# Никаких host-портов: TLS/80/443 терминирует Traefik, маршрут — через labels.
# Запуск: docker compose -f docker-compose.prod.yml up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: musicfy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: musicfy
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicfy -d musicfy"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - default

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Адрес БД задаём здесь, чтобы не зависеть от значения в .env.
      DATABASE_URL: postgresql+asyncpg://musicfy:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/musicfy
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.musicfy.rule=Host(`zavionix.shop`) || Host(`www.zavionix.shop`)"
      - "traefik.http.routers.musicfy.entrypoints=websecure"
      - "traefik.http.routers.musicfy.tls.certresolver=le"
      - "traefik.http.services.musicfy.loadbalancer.server.port=8000"

networks:
  web:
    external: true
  default: {}

volumes:
  pgdata: {}
